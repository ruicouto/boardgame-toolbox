<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="dieA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="dieB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="420" cy="90" r="110" fill="#6366f1" opacity="0.2"/>
  <circle cx="96" cy="432" r="120" fill="#10b981" opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="92" y="210" width="192" height="192" rx="40" fill="url(#dieA)"/>
    <rect x="228" y="110" width="192" height="192" rx="40" fill="url(#dieB)"/>
  </g>

  <g fill="#111827">
    <circle cx="150" cy="268" r="11"/>
    <circle cx="226" cy="344" r="11"/>

    <circle cx="282" cy="164" r="11"/>
    <circle cx="324" cy="206" r="11"/>
    <circle cx="366" cy="248" r="11"/>
  </g>
</svg>
