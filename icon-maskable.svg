<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="dieA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="dieB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background for maskable icons -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="422" cy="88" r="112" fill="#6366f1" opacity="0.2"/>
  <circle cx="90" cy="434" r="128" fill="#10b981" opacity="0.15"/>

  <!-- Centered safe-zone artwork -->
  <g transform="translate(8 8)">
    <rect x="96" y="210" width="186" height="186" rx="38" fill="url(#dieA)"/>
    <rect x="224" y="114" width="186" height="186" rx="38" fill="url(#dieB)"/>
    <g fill="#111827">
      <circle cx="152" cy="266" r="10"/>
      <circle cx="226" cy="340" r="10"/>
      <circle cx="280" cy="170" r="10"/>
      <circle cx="320" cy="210" r="10"/>
      <circle cx="360" cy="250" r="10"/>
    </g>
  </g>
</svg>
